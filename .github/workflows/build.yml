name: Build AiPi-PalChatV2 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git make gcc python3 python3-pip

    - name: Build firmware
      run: |
        cd project/Xiaozhi-AI
        make
- name: Upload firmware
  uses: actions/upload-artifact@v4
  with:
    name: aipi-firmware
    path: project/Xiaozhi-AI/build/build_out/*.bin
