[cfg]
# 0: no erase, 1:programmed section erase, 2: chip erase
erase = 1
# skip mode set first para is skip addr, second para is skip len, multi-segment region with ; separated
skip_mode = 0x0, 0x0
# 0: not use isp mode, #1: isp mode
boot2_isp_mode = 0
version = 2

[boot2]
filedir = ../aipi-palchatv2_board/config_8M/boot2_*.bin
address = 0x00000

[partition]
filedir = ./build/build_out/partition*.bin
address = 0xE000

[FW]
address = 0x10000
filedir = ./build/build_out/aipi-plachatv2_doubao_$(CHIPNAME).bin
